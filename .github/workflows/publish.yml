name: Publish to PyPI

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Set version
        id: set_version
        run: |
          python - <<'PY'
          import os
          import re
          import subprocess
          from pathlib import Path

          pyproject_path = Path("pyproject.toml")
          content = pyproject_path.read_text(encoding="utf-8")

          match = re.search(r'^version\s*=\s*"(\d+)\.(\d+)\.(\d+)"', content, re.MULTILINE)

          if not match:
              raise RuntimeError("Could not find version in pyproject.toml")

          base_major, base_minor, base_patch = map(int, match.groups())

          tags = subprocess.check_output(
              ["git", "tag", "--list", "v*"],
              text=True
          ).splitlines()

          version_pattern = re.compile(r"^v(\d+)\.(\d+)\.(\d+)$")
          parsed_tags = []
          for tag in tags:
              tag_match = version_pattern.match(tag.strip())
              if tag_match:
                  parsed_tags.append(tuple(map(int, tag_match.groups())))

          if parsed_tags:
              tag_major, tag_minor, tag_patch = max(parsed_tags)
              if (tag_major, tag_minor, tag_patch) > (base_major, base_minor, base_patch):
                  major, minor, patch = tag_major, tag_minor, tag_patch
              else:
                  major, minor, patch = base_major, base_minor, base_patch
          else:
              major, minor, patch = base_major, base_minor, base_patch

          event_name = os.environ["GITHUB_EVENT_NAME"]

          if event_name == "workflow_dispatch":
              bump = os.environ["VERSION_BUMP"]

              if bump == "major":
                  major += 1
                  minor = 0
                  patch = 0

              elif bump == "minor":
                  minor += 1
                  patch = 0

              elif bump == "patch":
                  patch += 1

              else:
                  raise RuntimeError(f"Invalid bump type: {bump}")

          else:
              # Automatic push build
              patch += 1

          new_version = f"{major}.{minor}.{patch}"

          updated = re.sub(
              r'^version\s*=\s*".*?"',
              f'version = "{new_version}"',
              content,
              count=1,
              flags=re.MULTILINE
          )

          pyproject_path.write_text(updated, encoding="utf-8")

          print(f"Using version: {new_version}")
          Path(os.environ["GITHUB_OUTPUT"]).write_text(f"version={new_version}\n", encoding="utf-8")
          PY
        env:
          VERSION_BUMP: ${{ github.event.inputs.version_bump }}

      - name: Build package
        run: python -m build

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.set_version.outputs.version }}
          name: v${{ steps.set_version.outputs.version }}
          generate_release_notes: true
