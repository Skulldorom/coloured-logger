name: Publish to PyPI

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Set version
        id: set_version
        run: |
          python - <<'PY'
          import os
          import re
          import subprocess
          import urllib.error
          import urllib.request
          import json
          from pathlib import Path

          pyproject_path = Path("pyproject.toml")
          content = pyproject_path.read_text(encoding="utf-8")
          github_output = os.environ.get("GITHUB_OUTPUT")
          if not github_output:
              raise RuntimeError(
                  "GITHUB_OUTPUT environment variable is not set; this script must run in GitHub Actions"
              )

          match = re.search(r'^version\s*=\s*"(\d+)\.(\d+)\.(\d+)"', content, re.MULTILINE)

          if not match:
              raise RuntimeError("Could not find version in pyproject.toml")

          base_major, base_minor, base_patch = map(int, match.groups())
          project_name_match = re.search(r'^name\s*=\s*"([^"]+)"', content, re.MULTILINE)
          if not project_name_match:
              raise RuntimeError("Could not find project name in pyproject.toml")
          project_name = project_name_match.group(1)

          try:
              tags_output = subprocess.check_output(
                  ["git", "tag", "--list", "v*", "--sort=-version:refname"],
                  stderr=subprocess.STDOUT,
                  text=True,
              )
              tags = tags_output.splitlines()
          except (subprocess.CalledProcessError, FileNotFoundError) as exc:
              print(f"Warning: failed to read git tags ({exc}); using pyproject version as base")
              tags = []

          version_pattern = re.compile(r"^v(\d+)\.(\d+)\.(\d+)$")
          latest_tag_version = None
          for tag in tags:
              tag_match = version_pattern.match(tag.strip())
              if tag_match:
                  latest_tag_version = tuple(map(int, tag_match.groups()))
                  break

          latest_pypi_version = None
          try:
              with urllib.request.urlopen(
                  f"https://pypi.org/pypi/{project_name}/json",
                  timeout=10,
              ) as response:
                  payload = json.loads(response.read().decode("utf-8"))
              releases = payload.get("releases", {})
              release_versions = []
              for release in releases:
                  release_match = re.fullmatch(r"(\d+)\.(\d+)\.(\d+)", release)
                  if release_match:
                      release_versions.append(tuple(map(int, release_match.groups())))
              if release_versions:
                  latest_pypi_version = max(release_versions)
          except (urllib.error.URLError, json.JSONDecodeError, TimeoutError) as exc:
              print(
                  f"Warning: failed to read versions from PyPI for '{project_name}' "
                  f"({exc}); continuing without PyPI baseline"
              )

          major, minor, patch = base_major, base_minor, base_patch
          if latest_tag_version:
              tag_major, tag_minor, tag_patch = latest_tag_version
              # Use the latest release tag as the source of truth for the next publish version.
              if (tag_major, tag_minor, tag_patch) > (base_major, base_minor, base_patch):
                  major, minor, patch = tag_major, tag_minor, tag_patch
          if latest_pypi_version and latest_pypi_version > (major, minor, patch):
              major, minor, patch = latest_pypi_version

          event_name = os.environ["GITHUB_EVENT_NAME"]

          if event_name == "workflow_dispatch":
              bump = os.environ["VERSION_BUMP"]

              if bump == "major":
                  major += 1
                  minor = 0
                  patch = 0

              elif bump == "minor":
                  minor += 1
                  patch = 0

              elif bump == "patch":
                  patch += 1

              else:
                  raise RuntimeError(f"Invalid bump type: {bump}")

          else:
              # Automatic push build
              patch += 1

          new_version = f"{major}.{minor}.{patch}"

          updated = re.sub(
              r'^version\s*=\s*".*?"',
              f'version = "{new_version}"',
              content,
              count=1,
              flags=re.MULTILINE
          )

          pyproject_path.write_text(updated, encoding="utf-8")

          print(f"Using version: {new_version}")
          latest_pypi_version_str = (
              ".".join(map(str, latest_pypi_version))
              if latest_pypi_version is not None
              else ""
          )
          with Path(github_output).open("a", encoding="utf-8") as output_file:
              output_file.write(f"version={new_version}\n")
              output_file.write(f"latest_pypi_version={latest_pypi_version_str}\n")
          PY
        env:
          VERSION_BUMP: ${{ github.event.inputs.version_bump }}

      - name: Build package
        run: python -m build

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create and push tag
        run: |
          previous_tag="v${{ steps.set_version.outputs.latest_pypi_version }}"
          if [ -n "${{ steps.set_version.outputs.latest_pypi_version }}" ]; then
            if git ls-remote --tags origin "refs/tags/$previous_tag" | grep -q .; then
              echo "Tag $previous_tag already exists on origin"
            else
              echo "Warning: latest PyPI tag $previous_tag is missing on origin; it cannot be backfilled automatically"
            fi
          fi

          tag="v${{ steps.set_version.outputs.version }}"
          if git ls-remote --tags origin "refs/tags/$tag" | grep -q .; then
            echo "Tag $tag already exists on origin"
          else
            if [ -z "$(git tag -l "$tag")" ]; then
              git tag "$tag" "$GITHUB_SHA"
            fi
            git push origin "$tag"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.set_version.outputs.version }}
          name: v${{ steps.set_version.outputs.version }}
          generate_release_notes: true
